<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>The Ledger UI</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border-bottom: 1px solid #eee; padding: 10px 8px; text-align: left; }
      th { color: #333; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
      a { color: #1f6feb; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .muted { color: #666; font-size: 12px; }
      .top { display:flex; justify-content: space-between; align-items: baseline; gap: 12px; }
    </style>
  </head>
  <body>
    <div class="top">
      <h2>The Ledger — Applications</h2>
      <div class="muted">Showing latest 50 from projection</div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Application</th>
          <th>State</th>
          <th>Decision</th>
          <th>Reviewer</th>
          <th>Last event</th>
        </tr>
      </thead>
      <tbody>
        {% for a in apps %}
        <tr>
          <td><a href="/applications/{{ a.application_id }}">{{ a.application_id }}</a></td>
          <td>{{ a.state }}</td>
          <td>{{ a.decision or "" }}</td>
          <td>{{ a.human_reviewer_id or "" }}</td>
          <td class="muted">{{ a.last_event_at or "" }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
